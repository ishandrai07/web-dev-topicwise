<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation part 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .cont {
            height: 100vh;
            width: 100vw;
            background-color: black;
            position: relative;
        }

        .box {
            height: 20vh;
            width: 20vw;
            background-color: yellow;
            position: absolute;
            animation-name: move;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;

        }

        @keyframes move {

            0% {
                left: 0;
                top: 10px; 
            }

            25% {
                left:80vw;
                top:10px;
            }

            50% {
                left: 80vw;
                top: 80vh;
            }

            75% {
                left: 0;
                top: 80vh;
            }

            100% {
                left: 0;
                top: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="cont">
        <div class="box"></div>
    </div>
</body>

</html>
