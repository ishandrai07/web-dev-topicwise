<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>object-fit & object-cover</title>

    <style>
        .cont{
            height:250px;
            width:250px;
            border: 5px solid rgb(29, 224, 45);
            background-color: lightgray;
        }

        img{
            height: 250px;
            width:250px;

            object-fit: cover;
            object-position: top right; 
            /* object-fit: contain; */
            /* object-fit: fill;    */



        }
    </style>
</head>
<body>
    <div class="cont">
        <img src ="gokuimage.webp">
    </div>
</body>
</html>
